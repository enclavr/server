name: CI

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build and install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5

      - name: Run linter
        run: golangci-lint run -c .golangci.yml --timeout 5m

      - name: Run tests with PostgreSQL
        if: false  # Disabled due to test isolation issues - use SQLite instead
        run: |
          go test -v -race -p 1 -coverprofile=coverage.out -count=1 \
            -timeout 15m \
            -short \
            ./...
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

      - name: Run tests with SQLite
        run: |
          # Skip tests that require PostgreSQL or Redis when using SQLite
          go test -v -race -coverprofile=coverage.out -skip 'TestRedis|TestPostgres|TestExtension|TestCacheService|TestTypingDebouncer|TestRateLimiterStore|TestPubSub|TestHub|TestPresence|TestWebSocket|TestGetHourlyActivity|TestAnalytics' ./...
        env:
          JWT_SECRET: test-jwt-secret-for-ci

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Build Docker image
        run: |
          docker build -t enclavr/server:${{ github.sha }} .
