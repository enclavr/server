version: "2"

run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  errcheck:
    check-type-assertions: true

issues:
  exclude-rules:
    # Exclude errcheck for test files - JSON marshal errors in tests don't need handling
    - path: _test\.go
      linters:
        - errcheck
    # Ignore errcheck for cache expiration and deletion - these are non-critical operations
    - path: ratelimit_redis\.go
      linters:
        - errcheck
      text: "Error return value of .* is not checked"
    # Ignore errcheck for cache service - these are non-critical operations
    - path: services/cache\.go
      linters:
        - errcheck
      text: "Error return value"
    # Ignore errcheck for HTTP response writes - connection errors can't be handled
    - path: handlers/.*\.go
      linters:
        - errcheck
      text: "json\\.Encoder.*Encode"
    # Ignore errcheck for WebSocket payload serialization - errors are non-critical
    - path: handlers/message\.go
      linters:
        - errcheck
      text: "wsPayload, _"
    - path: handlers/.*\.go
      linters:
        - errcheck
      text: "wsPayload, _"
    # Ignore errcheck for password generation - crypto rand errors are extremely rare
    - path: handlers/password\.go
      linters:
        - errcheck
      text: "rand\\.Read"
    # Ignore errcheck for twofactor - crypto and JSON errors are extremely rare
    - path: handlers/twofactor\.go
      linters:
        - errcheck
      text: "rand\\.Read|json\\.Unmarshal"
    # Ignore errcheck for file handlers - path resolution and read errors
    - path: handlers/file\.go
      linters:
        - errcheck
      text: "filepath\\.Abs|io\\.ReadAll"
    # Ignore errcheck for websocket hub - pub/sub and buffer pool errors are non-critical
    - path: websocket/hub\.go
      linters:
        - errcheck
      text: ".*"
